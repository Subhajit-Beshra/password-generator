<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=shield_locked" />
    <title>Password Generator</title>
</head>
<body>
    <div class="container">
        <div class="subcontainer-1">
            <div class="title">
               <h1>Password Generator
                <span class="material-symbols-outlined">shield_locked</span>
               </h1>
        </div>
        </div>
        <div class="subcontainer-2">
            <div class="input-container">
                <label for="length">Password Length:</label>
                <input type="number" id="length" min="1" max="128" value="12">
            </div>
            <div class="checkbox-container">
                <label><input type="checkbox" id="include-uppercase"> Include Uppercase Letters</label>
                <label><input type="checkbox" id="include-lowercase"> Include Lowercase Letters</label>
                <label><input type="checkbox" id="include-numbers"> Include Numbers</label>
                <label><input type="checkbox" id="include-symbols"> Include Symbols</label>
            </div>
            <button id="generate-btn">Generate Password</button>
            <div class="output-container">
                <textarea id="password-output" readonly></textarea>
            </div>
        </div>
    </div>
</body>
</html>
