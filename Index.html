<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h2>Security Generator</h2>

        <input type="text" id="password" placeholder="Your password" readonly>
            <label>-: Password Length :-</label>
            <input type="number" id="length" min="4" max="30" value="12">
            <lable>–:Choose at least one option:–</lable>
            <div class="sub-container">
    <ul>
        <li>
            <label><input type="checkbox" id="uppercase" checked> Uppercase</label>
        </li>

        <li>
            <label><input type="checkbox" id="lowercase" checked> Lowercase</label>
        </li>

        <li>
            <label><input type="checkbox" id="numbers" checked> Numbers</label>
       </li>
       
        <li>
            <label><input type="checkbox" id="symbols" checked> Symbols</label>
        </li>
    </ul>
</div>
        <button class = "btn-1" onclick="generatePassword()">Generate Password</button>
        <button class = "btn-2" onclick="copyPassword()">Copy Password</button>
    </div>

<script src="script.js"></script>
</body>
</html>
