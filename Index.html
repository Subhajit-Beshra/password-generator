<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=encrypted" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <title>Password Generator</title>
</head>
<body>
    <h1>Password Generator
        <span class="material-symbols-outlined">encrypted</span>
    </h1>
    <div class="container">
        <div class="password-display">
            <input type = "text" id = "password" placeholder="Your password" readonly>
        </div>
        <div class="password-len">
            <label for="length">Password Length:</label>
            <input type = "number" id ="length" min = "4" max = "20" value = "12">
        </div>
        <div class="details">
            <lable for = "captions">Choose at least one option</lable>
            <div class="options">
                <lable>
                    <input type="checkbox" id="uppercase" checked> Uppercase 
                </lable>
                <lable>
                    <input type="checkbox" id="lowercase" checked> Lowercase
                </lable>
                <lable>
                    <input type="checkbox" id="numbers" checked> Numbers
                </lable>
                <lable>
                    <input type="checkbox" id="symbols" checked> Symbols
                </lable>
            </div>
        </div>
        <div class="click">
            <button onclick = "generate()">Generate Password</button>
        </div>
        <div class="click">
            <button onclick= "copy()">Copy to Clipboard</button>
        </div>
    </div> 
    <script src="script. js"></script>
</body>
</html>
